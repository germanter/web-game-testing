<!DOCTYPE html>
<html>
<body>

    <button id="btn">Testing V0.0.1</button>

    <script type="module">
        // Direct module import from our local workspace
        import {data} from './config.js';
        console.log("Current State:", data);

        document.getElementById('btn').onclick = async () => {
            const dat = {
                "main" : 1,
                "sec" : 200
            };

            data.push(dat)


            // Post directly to our raw socket server
            await fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // Delay slightly for the disk write to complete before reloading
            setTimeout(() => location.reload(), 100);
        };
    </script>
</body>
</html>
