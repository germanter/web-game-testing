<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testing</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #instructions {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 20, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(45deg, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin: 0.5rem 0;
            text-align: center;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 40px;
            margin-top: 30px;
            background: rgba(0,0,0,0.4);
            padding: 20px 40px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .controls-grid div {
            display: flex;
            justify-content: space-between;
            width: 200px;
        }
        .key {
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 4px;
            color: #38bdf8;
            font-weight: bold;
            border: 1px solid #475569;
        }
        #ui {
            position: absolute;
            top: 15px; left: 15px;
            color: rgba(255,255,255,0.9);
            pointer-events: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            z-index: 5;
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 12px; height: 12px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
        }
        #crosshair::before { top: 5px; left: 0; width: 12px; height: 2px; }
        #crosshair::after { top: 0; left: 5px; width: 2px; height: 12px; }
    </style>
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="instructions">
        <div class="controls-grid">
            <div><span>Look Around</span> <span class="key">Mouse</span></div>
            <div><span>Move Forward/Back</span> <span class="key">W / S</span></div>
            <div><span>Strafe Left/Right</span> <span class="key">A / D</span></div>
            <div><span>Ascend / Descend</span> <span class="key">E / Q</span></div>
            <div><span>Sprint</span> <span class="key">Shift</span></div>
        </div>
    </div>

    <div id="ui">
        <div id="seed-info" style="color: #38bdf8; margin-bottom: 5px; font-weight: bold;"></div>
        <div id="stats">Chunks: 0 | Pos: 0, 0</div>
        <div id="biome-info" style="color: #4ade80; margin-top: 5px;">Biome: Calculating...</div>
    </div>
    <div id="crosshair"></div>

<script type="module"  src="src/initMap.js"></script>
</body>
</html>
