<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-BS Color Utility</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121214;
            color: #e2e8f0;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #1a1a1e;
            border: 1px solid #2d2d34;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .input-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }
        .input-container {
            flex-grow: 1;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="text"] {
            width: 100%;
            background: #26262b;
            border: 1px solid #3f3f46;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1rem;
            box-sizing: border-box;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 60px;
            height: 50px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #3f3f46; border-radius: 6px; }

        .preview-box {
            height: 120px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: 1.2rem;
            transition: background 0.15s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .formats-table {
            width: 100%;
            border-collapse: collapse;
            font-family: monospace;
        }
        .formats-table td {
            padding: 10px 0;
            border-bottom: 1px solid #2d2d34;
        }
        .formats-table td:first-child { color: #94a3b8; width: 35%; }
        
        .palette-title { margin: 24px 0 12px 0; font-size: 1rem; color: #94a3b8;}
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .swatch {
            height: 45px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="input-row">
            <div class="input-container">
                <label for="hex-input">Input Color (0x... or #...)</label>
                <input type="text" id="hex-input" value="0x405060" placeholder="e.g. 0x405060 or #405060">
            </div>
            <div>
                <label for="picker">Pick</label>
                <input type="color" id="picker" value="#405060">
            </div>
        </div>

        <div id="preview" class="preview-box">0x405060</div>

        <div class="grid-layout">
            <div>
                <table class="formats-table">
                    <tr><td>Hex Literal</td><td id="fmt-lit">0x405060</td></tr>
                    <tr><td>Standard Hex</td><td id="fmt-hex">#405060</td></tr>
                    <tr><td>RGB</td><td id="fmt-rgb">rgb(64, 80, 96)</td></tr>
                    <tr><td>Float (0-1)</td><td id="fmt-float">0.25, 0.31, 0.38</td></tr>
                </table>
            </div>
            <div>
                <div class="palette-title">Tints & Shades</div>
                <div class="palette-grid" id="shades-container"></div>
            </div>
        </div>
    </div>

    <script>
        const hexInput = document.getElementById('hex-input');
        const colorPicker = document.getElementById('picker');
        const preview = document.getElementById('preview');
        
        const fmtLit = document.getElementById('fmt-lit');
        const fmtHex = document.getElementById('fmt-hex');
        const fmtRgb = document.getElementById('fmt-rgb');
        const fmtFloat = document.getElementById('fmt-float');
        const shadesContainer = document.getElementById('shades-container');

        // Main parsing logic to clean up 0x or loose text
        function cleanToHex(val) {
            let clean = val.replace(/^0x/i, '').replace(/^#/, '').trim();
            // Handle shorthand hex like FFF
            if (clean.length === 3) {
                clean = clean.split('').map(c => c + c).join('');
            }
            if (/^[0-9A-F]{6}$/i.test(clean)) {
                return clean.toLowerCase();
            }
            return null;
        }

        function updateAll(hex6, source) {
            const hexStr = '#' + hex6;
            const litStr = '0x' + hex6;

            // Update Input Fields safely to prevent infinite loops
            if (source !== 'text') hexInput.value = litStr;
            if (source !== 'picker') colorPicker.value = hexStr;

            // Update UI Previews
            preview.style.backgroundColor = hexStr;
            preview.innerText = litStr;
            
            // Calculate Text Contrast Color (Black/White text depending on color weight)
            const r = parseInt(hex6.substring(0,2), 16);
            const g = parseInt(hex6.substring(2,4), 16);
            const b = parseInt(hex6.substring(4,6), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            preview.style.color = brightness > 125 ? '#121214' : '#ffffff';

            // Update Tables
            fmtLit.innerText = litStr;
            fmtHex.innerText = hexStr;
            fmtRgb.innerText = `rgb(${r}, ${g}, ${b})`;
            fmtFloat.innerText = `${(r/255).toFixed(2)}, ${(g/255).toFixed(2)}, ${(b/255).toFixed(2)}`;

            // Generate Shades Matrix
            generateShades(r, g, b);
        }

        function generateShades(r, g, b) {
            shadesContainer.innerHTML = '';
            // Generate 5 quick step steps mixing with black and white
            const factors = [0.4, 0.7, 1.0, 1.3, 1.6]; 
            factors.forEach(f => {
                let nr = Math.min(255, Math.max(0, Math.round(r * f)));
                let ng = Math.min(255, Math.max(0, Math.round(g * f)));
                let nb = Math.min(255, Math.max(0, Math.round(b * f)));
                
                let h = ((1 << 24) + (nr << 16) + (ng << 8) + nb).toString(16).slice(1);
                
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = '#' + h;
                swatch.title = '0x' + h;
                swatch.onclick = () => updateAll(h, 'swatch');
                shadesContainer.appendChild(swatch);
            });
        }

        // Event Listeners
        hexInput.addEventListener('input', (e) => {
            const clean = cleanToHex(e.target.value);
            if (clean) updateAll(clean, 'text');
        });

        colorPicker.addEventListener('input', (e) => {
            const clean = cleanToHex(e.target.value);
            if (clean) updateAll(clean, 'picker');
        });

        // Init setup
        updateAll('405060', 'init');
    </script>
</body>
</html>
